<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文渊阁</title>
    <link rel="icon" href="../logo.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Shalimar&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        body { margin: 0; padding: 0; background: black; }
        header { display: block !important; margin: 0; padding: 0; }
        .logo-container { padding: 0; }
        header h1 { margin: 0; }
        #reading-test { margin-top: 0; }
        .quiz-question:first-child { margin-top: 0; }
        #video { display: none; }
        .title-container {
            position: absolute;
            top: 70px;
            left: 60px;
            color: white;
            font-family: 'Ma Shan Zheng', sans-serif;
            font-size: 20px;
            z-index: 1000;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            display: block;
        }
        .title-container h2 {
            font-weight: normal !important;
        }
        h3 {
            font-weight: normal !important;
        }
        .quiz-question {
            margin: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border: 3px solid white;
            border-radius: 5px;
            text-align: left;
            word-wrap: break-word;
            flex: 1 1 300px;
            max-width: 400px;
        }
        .vocab-list {
            display: flex !important;
            flex-wrap: wrap;
            justify-content: flex-start;
            gap: 10px;
            width: calc(100vw - 100px);
        }
        .result-btn {
            position: relative;
            overflow: hidden;
        }
        .result-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 1s infinite;
        }
        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    </head>
<body>

    <header>
        <div class="logo-container">
            <img src="../logo.ico" alt="Logo">
            <h1>Vaên Uyeân Caùc</h1>
        </div>
        <button id="home-header-btn" style="background: transparent; border: none; color: white; font-size: 40px; cursor: pointer;">⌂</button>
    </header>

    <div class="title-container">
        <h2>选择下列词语的正确含义:</h2>
    </div>

    <!-- Loading Spinner -->
    <div id="loading-spinner" class="spinner"></div>

    <!-- Content for reading test -->
    <div id="reading-test" class="vocab-list">
    </div>
<!-- Background -->
<video id="video" src="../background.mp4" muted autoplay loop preload="auto"></video>

<!-- Result Modal -->
<div id="result-modal" class="modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:black; padding:20px; border:1px solid white; z-index:2000; color:white; font-family:'Ma Shan Zheng', sans-serif; text-align:center; font-size:24px;">
    <p id="modal-text"></p>
    <button id="close-modal" style="font-family:'Ma Shan Zheng', sans-serif; font-size:24px;">关闭</button>
</div>

<!-- Confirmation Modal -->
<div id="confirm-modal" class="modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:black; padding:20px; border:1px solid white; z-index:2001; color:white; font-family:'Ma Shan Zheng', sans-serif; text-align:center; font-size:24px;">
    <p>是否想再检查一次？</p>
    <button id="continue-btn" style="font-family:'Ma Shan Zheng', sans-serif; font-size:24px;">继续</button>
    <button id="home-btn" style="font-family:'Ma Shan Zheng', sans-serif; font-size:24px;">返回首页</button>
</div>

<!-- Notification -->
<div id="notification" class="notification">通知内容</div>

<script src="script.js"></script>

</body>
</html>
