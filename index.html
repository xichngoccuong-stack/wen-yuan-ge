<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文渊阁</title>
    <link rel="icon" href="logo.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Shalimar&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.ico" alt="Logo">
            <h1>Vaên Uyeân Caùc</h1>
        </div>

        <div class="menu-container">
            <button id="menu-button" style="background: transparent; border: none; color: white; font-size: 30px; cursor: pointer;">☰</button>
            <div id="menu-dropdown" class="menu-dropdown">
                <ul>
                    <li><a href="#" id="add-vocab-link">✦ 生词</a></li>
                    <li><a href="#" id="setup-quiz-link">✦ 设置检查</a></li>
                    <li><a href="#" id="check-vocab-link">✦ 检查词汇</a></li>
                    <li><a href="commonPhrases/index.html" id="common-phrases-link" style="background: linear-gradient(to right, green, orange); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">✦ 日常用语</a></li>
                </ul>
            </div>
        </div>
        <div class="search-filter-row">
            <input type="text" id="search-input" placeholder="搜索。。。" class="search-input">
            <select id="category-filter" class="category-filter">
                <option value="">全部</option>
                <option value="生活">生活</option>
                <option value="工作">工作</option>
                <option value="学习">学习</option>
            </select>
        </div>
    </header>

        <!-- Vocabulary Form -->
        <div id="vocab-form" class="vocab-form">
            <h2 style="font-weight: normal;">添加词汇</h2>
            <form id="vocab-form-element">
                <label for="chinese">中文词语:</label>
                <input type="text" id="chinese" required>
                <label for="meaning">含义:</label>
                <input type="text" id="meaning" required>
                <label for="pinyin">拼音:</label>
                <input type="text" id="pinyin" required>
                <label for="hanviet">汉越音:</label>
                <input type="text" id="hanviet">
                <label for="category">类别:</label>
                <select id="category">
                    <option value="生活" selected>生活</option>
                    <option value="工作">工作</option>
                    <option value="学习">学习</option>
                </select>
                <label for="audio">音频:</label>
                <input type="file" id="audio" accept="audio/mp3">
                <div class="button-row">
                    <button type="submit">添加</button>
                    <button type="button" id="close-form">关闭</button>
                </div>
            </form>
        </div>

        <!-- Edit Vocabulary Form -->
        <div id="edit-vocab-form" class="vocab-form" style="display: none;">
            <h2 id="edit-title" style="font-weight: normal;"></h2>
            <form id="edit-vocab-form-element">
                <button type="button" id="delete-vocab-btn" style="margin-left: 10px; background: linear-gradient(to right, red, black); color: white; border: none; padding: 10px 20px; font-family: 'Ma Shan Zheng', sans-serif; font-size: 20px;">删除词语</button>
                <label for="edit-meaning">含义:</label>
                <input type="text" id="edit-meaning" required>
                <label for="edit-pinyin">拼音:</label>
                <input type="text" id="edit-pinyin" required>
                <label for="edit-hanviet">汉越音:</label>
                <input type="text" id="edit-hanviet">
                <label for="edit-category">类别:</label>
                <select id="edit-category">
                    <option value="生活" selected>生活</option>
                    <option value="工作">工作</option>
                    <option value="学习">学习</option>
                </select>
                <label for="edit-audio">音频:</label>
                <input type="file" id="edit-audio" accept="audio/mp3">
                <div class="button-row">
                    <button type="submit">更新</button>
                    <button type="button" id="close-edit-form">关闭</button>
                </div>
            </form>
        </div>

        <!-- Quiz Settings Modal -->
        <div id="quiz-settings-form" class="vocab-form" style="display: none;">
            <h2 style="font-weight: normal;">设置检查</h2>
            <form id="quiz-settings-form-element">
                <label for="num-words">词汇数:</label>
                <input type="number" id="num-words">
                <label for="quiz-category">类别:</label>
                <select id="quiz-category">
                    <option value="全部" selected>全部</option>
                    <option value="生活">生活</option>
                    <option value="工作">工作</option>
                    <option value="学习">学习</option>
                </select>
                <div class="button-row">
                    <button type="submit">保存</button>
                    <button type="button" id="close-quiz-form">关闭</button>
                </div>
            </form>
        </div>

        <!-- Check Vocab Modal -->
        <div id="check-vocab-modal" class="vocab-form" style="display: none;">
            <h2 style="font-weight: normal; color: black;">检查词汇</h2>
            <p style="color: black;">请选择检查类型:</p>
            <div class="button-row">
                <button type="button" id="read-btn">读</button>
                <button type="button" id="listen-btn">听</button>
                <button type="button" id="translate-btn">译</button>
            </div>
            <div class="button-row" style="margin-top: 20px; justify-content: center;">
                <button type="button" id="close-check-vocab-modal">关闭</button>
            </div>
        </div>

        <!-- Background -->
    <img id="image" src="background.png" alt="背景图像">
    <video id="video" src="background.mp4" muted autoplay loop></video>

    <script src="script.js"></script>

    <!-- Notification -->
    <div id="notification" class="notification">词汇已成功添加！</div>

    <!-- Vocabulary List -->
    <div id="vocab-list" class="vocab-list"></div>
    <div id="spinner" class="spinner"></div>

    <!-- 同开发者的音乐听力网站 Link -->
    <div id="xianyinge-btn" style="position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); z-index: 1000;">
        <a href="https://xian-yin-ge.netlify.app" target="_blank" style="background: linear-gradient(to right, orange, red); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 20px; font-family: 'Ma Shan Zheng', sans-serif; text-decoration: none;">仙音阁（同开发者的音乐听力网站）</a>
    </div>
    </body>
</html>
