<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Vocabulary Management</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="script.js"></script>
</head>
<body>
    <div id="login-form" style="display: none;">
        <h2>Admin Login</h2>
        <input type="text" id="user" placeholder="User" required>
        <div class="password-container">
            <input type="password" id="password" placeholder="Password" required>
            <span id="toggle-password" class="toggle-icon">👁️</span>
        </div>
        <button id="login-btn">Login</button>
    </div>

    <div id="admin-content" style="display: none;">
        <header>
            <h2>Vocabulary Management</h2>
            <button id="logout-btn">Logout</button>
        </header>

        <div id="notification" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: green; color: white; padding: 10px; border-radius: 5px; z-index: 1000;">Success</div>

        <main style="display: flex; width: 100%;">
            <div id="testList-panel" style="flex: 2; padding: 10px; border-right: 1px solid #ccc;">
                <h3>Test List</h3>
                <div id="testList"></div>
            </div>
            <div style="flex: 8; padding: 10px;">
                <form id="search-form" class="search-row">
                    <input type="text" id="keyword" placeholder="Keyword">
                    <input type="date" id="start-date" placeholder="Start Date">
                    <input type="date" id="end-date" placeholder="End Date">
                    <label class="checkbox-label"><input type="checkbox" id="no-audio"> No Audio</label>
                    <button type="submit">Search</button>
                </form>

                <div id="results"></div>
            </div>
        </main>
    </div>
</body>
</html></content>
