<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文渊阁</title>
    <link rel="icon" href="../logo.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Shalimar&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        body { margin: 0; padding: 0; background: black; }
        header { display: block !important; margin: 0; padding: 0; }
        .logo-container { padding: 0; }
        header h1 { margin: 0; }
        #listening-test { margin-top: 0; }
        #video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; display: block; }
        .title-container {
            position: absolute;
            top: 70px;
            left: 60px;
            color: white;
            font-family: 'Ma Shan Zheng', sans-serif;
            font-size: 20px;
            z-index: 1000;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            display: block;
        }
        .title-container h2 {
            font-weight: normal !important;
        }
        h3 {
            font-weight: normal !important;
        }
        .quiz-question {
            margin: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border: 3px solid white;
            border-radius: 5px;
            text-align: left;
            word-wrap: break-word;
            flex: 1 1 200px;
            max-width: 300px;
            font-size: 20px;
        }
        .chinese-input {
            background: transparent;
            color: white;
            border: 1px solid white;
        }
        .vocab-list {
            display: flex !important;
            flex-wrap: wrap;
            justify-content: flex-start;
            gap: 10px;
            width: calc(100vw - 100px);
        }
        .result-btn {
            position: relative;
            overflow: hidden;
            background: linear-gradient(to right, red, black);
            color: white;
            border: none;
            padding: 10px 20px;
            font-family: 'Ma Shan Zheng', sans-serif;
            font-size: 20px;
        }
        .result-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="../logo.ico" alt="Logo">
            <h1>Vaên Uyeân Caùc</h1>
        </div>
        <button id="home-btn" style="background: transparent; border: none; color: white; font-size: 40px; cursor: pointer;" onclick="window.location.href='../index.html';">⌂</button>
    </header>

    <div class="title-container">
        <h2 id="test-title">听写下面词汇的汉字:</h2>
    </div>

    <!-- Loading Spinner -->
    <div id="loading-spinner" class="spinner"></div>

    <!-- Background -->
    <video id="video" src="../background.mp4" muted autoplay loop></video>

    <!-- Test Container -->
    <div id="listening-test" class="vocab-list"></div>

    <div id="confirm-modal" class="modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:black; padding:20px; border:1px solid white; z-index:2001; color:white; font-family:'Ma Shan Zheng', sans-serif; text-align:center; font-size:24px;">
        <p>是否想继续练习？</p>
        <button id="continue-btn" style="font-family:'Ma Shan Zheng', sans-serif; font-size:24px;">继续</button>
        <button id="modal-home-btn" style="font-family:'Ma Shan Zheng', sans-serif; font-size:24px;" onclick="document.getElementById('confirm-modal').style.display='none'; window.location.href='../index.html';">返回首页</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
